<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Checklist Mission IA</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Mission IA</p>
          <h1>Checklist Lilipass</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" aria-label="Réinitialiser la checklist">
          ↺
        </button>
      </header>

      <section class="summary" aria-label="Progression globale">
        <div>
          <span id="doneCount">0</span>/<span id="totalCount">0</span>
          <small>tâches faites</small>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-bar" id="overallProgress"></div>
        </div>
      </section>

      <nav class="tabs" id="tabs" aria-label="Modules"></nav>

      <section class="blocks" id="blocks"></section>

      <section class="sync-panel" aria-label="Mémoire">
        <div>
          <p class="eyebrow">Mémoire</p>
          <h2>Suivi téléphone + ordinateur</h2>
        </div>
        <p class="context">Les coches et les notes sont sauvegardées automatiquement sur cet appareil. Pour passer le suivi sur un autre appareil, copie la mémoire ici puis colle-la là-bas.</p>
        <div class="sync-actions">
          <button class="secondary-button" id="copyMemoryButton" type="button">Copier la mémoire</button>
          <button class="secondary-button" id="importMemoryButton" type="button">Importer ici</button>
        </div>
        <label for="memoryCode">Mémoire copiée</label>
        <textarea id="memoryCode" rows="3" placeholder="Colle ici la mémoire copiée depuis l'autre appareil."></textarea>
        <p class="sync-status" id="syncStatus">Mémoire automatique active sur cet appareil.</p>
      </section>

      <section class="notes-panel" aria-label="Notes">
        <label for="notes">Notes rapides</label>
        <textarea id="notes" rows="4" placeholder="Décisions, accès manquants, prochaines étapes..."></textarea>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
